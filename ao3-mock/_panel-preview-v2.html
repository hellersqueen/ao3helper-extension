<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════════╗
  ║  AO3 HELPER — PANEL v2 PREVIEW                                         ║
  ║                                                                        ║
  ║  Exploration design : sidebar verticale + cards + dark mode            ║
  ║  Fichier séparé — le panel actuel n'est PAS modifié.                   ║
  ║                                                                        ║
  ║  Inspiré de : Notion + Arc + Obsidian                                  ║
  ╚══════════════════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AO3 Helper — Panel v2 Preview</title>
  <style>
  /* ═══════════════════════════════════════════════════════
     RESET + BASE
  ═══════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    padding: 32px 16px 48px;
    background: #f4ede8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  /* ─── Preview toolbar ─────────────────────────────── */
  .pt {
    background: #1a1a26;
    color: #7070a0;
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 8px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px 10px;
    width: 900px;
    max-width: 99vw;
  }
  .pt strong { color: #e2e2f2; }
  .pt a { color: #9d7de8; text-decoration: none; }
  .pt a:hover { text-decoration: underline; }
  .pt-note { margin-left: auto; color: #7c5cbf; font-weight: 600; }
  .pt-sep { color: #2a2a40; }

  /* ═══════════════════════════════════════════════════════
     V2 PANEL
  ═══════════════════════════════════════════════════════ */
  .v2 {
    display: flex;
    width: 900px;
    max-width: 99vw;
    height: 600px;
    border-radius: 16px;
    overflow: hidden;
    background: #13131c;
    color: #e2e2f2;
    font-size: 13px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 32px 80px rgba(0,0,0,0.65),
      0 6px 20px rgba(0,0,0,0.4);
  }

  /* ═══════════════════════════════════════════════════════
     SIDEBAR
  ═══════════════════════════════════════════════════════ */
  .v2-sidebar {
    width: 214px;
    min-width: 214px;
    background: #0e0e18;
    border-right: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
  }

  /* Logo */
  .v2-logo {
    padding: 17px 14px 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .v2-logo-mark {
    width: 28px; height: 28px;
    background: #990000;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: #fff;
    letter-spacing: -0.05em; flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(153,0,0,0.5);
  }
  .v2-logo-name {
    font-size: 13px; font-weight: 700; color: #ddddf0;
    letter-spacing: -0.03em; line-height: 1.2;
  }
  .v2-logo-sub { font-size: 10px; color: #40405a; font-weight: 400; }

  /* Nav */
  .v2-nav {
    flex: 1; overflow-y: auto; padding: 10px 8px;
    display: flex; flex-direction: column; gap: 1px;
    scrollbar-width: none;
  }
  .v2-nav::-webkit-scrollbar { display: none; }

  .v2-nav-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.09em; color: #2e2e4a; padding: 10px 10px 5px;
    flex-shrink: 0;
  }

  .v2-nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7.5px 10px; border-radius: 7px; cursor: pointer;
    transition: background 0.12s, color 0.12s;
    color: #6868a0; font-size: 12.5px; font-weight: 450;
    border: none; background: none; width: 100%; text-align: left;
    user-select: none;
  }
  .v2-nav-item:hover:not(.active) {
    background: rgba(255,255,255,0.04); color: #9090b8;
  }
  .v2-nav-item.active {
    background: rgba(124,92,191,0.15); color: #b09af0; font-weight: 550;
  }
  .v2-nav-icon { width: 18px; text-align: center; font-size: 14px; flex-shrink: 0; }
  .v2-nav-count {
    margin-left: auto; font-size: 10px; font-weight: 500;
    background: rgba(255,255,255,0.06); color: #3a3a58;
    padding: 1px 5px; border-radius: 8px;
  }
  .v2-nav-item.active .v2-nav-count {
    background: rgba(124,92,191,0.2); color: #9d7de8;
  }

  /* Quick actions */
  .v2-qa {
    padding: 8px; display: flex; gap: 5px;
    border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }
  .v2-qa-btn {
    flex: 1; padding: 6px 0; font-size: 10.5px; font-weight: 600;
    border-radius: 6px; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); color: #5858a0;
    cursor: pointer; transition: all 0.12s; font-family: inherit;
  }
  .v2-qa-btn:hover { background: rgba(255,255,255,0.08); color: #9090b8; }

  /* Footer */
  .v2-sidebar-foot {
    padding: 9px 12px; border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .v2-ver { font-size: 10px; color: #2a2a40; }
  .v2-close {
    width: 22px; height: 22px; border-radius: 5px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: #5858a0; cursor: pointer; font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .v2-close:hover { background: rgba(255,255,255,0.12); color: #e2e2f2; }

  /* ═══════════════════════════════════════════════════════
     MAIN AREA
  ═══════════════════════════════════════════════════════ */
  .v2-main {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; min-width: 0;
  }

  /* Top bar */
  .v2-topbar {
    padding: 11px 16px 10px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
  }
  .v2-search-wrap { flex: 1; position: relative; }
  .v2-search-ico {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: #40405a; font-size: 11px; pointer-events: none;
  }
  .v2-search {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 7px;
    padding: 7px 10px 7px 28px; color: #e2e2f2; font-size: 12.5px;
    outline: none; transition: all 0.15s; font-family: inherit;
  }
  .v2-search::placeholder { color: #38385a; }
  .v2-search:focus {
    border-color: rgba(124,92,191,0.45);
    background: rgba(255,255,255,0.07);
    box-shadow: 0 0 0 3px rgba(124,92,191,0.1);
  }

  .v2-btn {
    padding: 6px 12px; border-radius: 6px; font-size: 11.5px;
    font-weight: 500; cursor: pointer; border: none;
    transition: all 0.12s; white-space: nowrap; font-family: inherit;
  }
  .v2-btn-ghost {
    background: rgba(255,255,255,0.05); color: #6060a0;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .v2-btn-ghost:hover { background: rgba(255,255,255,0.09); color: #9090b8; }
  .v2-btn-save {
    background: #6d28d9; color: #fff; padding: 6px 16px;
    box-shadow: 0 2px 10px rgba(109,40,217,0.35);
  }
  .v2-btn-save:hover { background: #5b21b6; }

  /* Section header */
  .v2-section-hdr {
    padding: 13px 16px 7px; display: flex; align-items: baseline;
    gap: 8px; flex-shrink: 0;
  }
  .v2-section-title { font-size: 13.5px; font-weight: 650; color: #c0c0e0; letter-spacing: -0.02em; }
  .v2-section-sub  { font-size: 11px; color: #38384a; }
  .v2-enabled-badge {
    margin-left: auto; font-size: 10.5px; font-weight: 600;
    color: #9d7de8; background: rgba(124,92,191,0.12);
    padding: 2px 8px; border-radius: 8px;
  }

  /* Module list */
  .v2-list {
    flex: 1; overflow-y: auto; padding: 0 10px 10px;
    display: flex; flex-direction: column; gap: 5px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
  }
  .v2-list::-webkit-scrollbar { width: 3px; }
  .v2-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  /* Card */
  .v2-card {
    background: rgba(255,255,255,0.028);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 9px; overflow: hidden;
    transition: border-color 0.15s;
  }
  .v2-card:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.045); }
  .v2-card.on {
    background: rgba(124,92,191,0.06);
    border-color: rgba(124,92,191,0.24);
  }

  .v2-card-main {
    display: flex; align-items: center;
    padding: 8px 12px; gap: 10px;
  }
  .v2-card-info { flex: 1; min-width: 0; }
  .v2-card-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  .v2-card-name {
    font-size: 12.5px; font-weight: 530; color: #b8b8d8;
    letter-spacing: -0.01em;
  }
  .v2-card.on .v2-card-name { color: #d0d0f0; }
  .v2-card-desc {
    font-size: 11px; color: #6868a0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .v2-card.on .v2-card-desc { color: #8888c4; }

  /* Badges */
  .v2-badge {
    font-size: 8.5px; font-weight: 700; padding: 1.5px 5px;
    border-radius: 3px; text-transform: uppercase; letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .bdg-popular    { background: rgba(52,199,89,0.11);  color: #4ade80; border: 1px solid rgba(52,199,89,0.2); }
  .bdg-exp        { background: rgba(255,159,10,0.11); color: #ffbb33; border: 1px solid rgba(255,159,10,0.2); }
  .bdg-perf       { background: rgba(255,69,58,0.11);  color: #ff7b72; border: 1px solid rgba(255,69,58,0.2); }

  /* Toggle switch */
  .v2-toggle { position: relative; display: inline-flex; align-items: center; cursor: pointer; flex-shrink: 0; }
  .v2-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .v2-track {
    width: 32px; height: 18px; background: rgba(255,255,255,0.18);
    border-radius: 9px; position: relative; transition: background 0.15s;
    border: 1px solid rgba(255,255,255,0.22);
  }
  .v2-toggle input:checked + .v2-track { background: #7c3aed; border-color: #7c3aed; }
  .v2-thumb {
    position: absolute; top: 50%; left: 2px;
    transform: translateY(-50%);
    width: 12px; height: 12px;
    background: rgba(255,255,255,0.6); border-radius: 50%;
    transition: left 0.15s cubic-bezier(.4,0,.2,1), background 0.15s;
  }
  .v2-toggle input:checked + .v2-track .v2-thumb {
    left: calc(100% - 14px); background: #fff;
  }

  /* Expand button */
  .v2-exp-btn {
    width: 20px; height: 20px; border-radius: 4px; border: none;
    background: none; color: #38384a; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; transition: all 0.15s; flex-shrink: 0;
  }
  .v2-exp-btn:hover { background: rgba(255,255,255,0.06); color: #7070a0; }
  .v2-card.open .v2-exp-btn { color: #9d7de8; rotate: 180deg; }

  /* Config area */
  .v2-config { display: none; padding: 0 12px 10px; border-top: 1px solid rgba(255,255,255,0.05); }
  .v2-card.open .v2-config { display: block; }
  .v2-config-msg { padding: 10px 0 2px; font-size: 11px; color: #32324a; font-style: italic; }

  /* Status bar */
  .v2-status {
    padding: 7px 16px; border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .v2-status-txt  { font-size: 10.5px; color: #32324a; }
  .v2-status-on   { font-size: 10.5px; color: #7c5cbf; font-weight: 600; }
  .v2-status-hint { margin-left: auto; font-size: 10.5px; color: #28284a; }

  /* Empty state */
  .v2-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #38384a; font-size: 12px; font-style: italic;
  }
  </style>
</head>
<body>

<!-- Preview info bar -->
<div class="pt">
  <strong>🔬 Panel v2 Preview</strong>
  <span class="pt-sep">·</span>
  <span>Sidebar verticale · Cards · Toggle switches · Badges</span>
  <span class="pt-sep">·</span>
  <span>Design Notion + Arc + Obsidian</span>
  <span class="pt-sep">·</span>
  <span>Fichier séparé — <a href="_panel-preview.html">← voir v1</a></span>
  <span class="pt-note">v2 concept</span>
</div>

<!-- ══════════════════════════════════════════════════════════
     PANEL
══════════════════════════════════════════════════════════ -->
<div class="v2">

  <!-- SIDEBAR -->
  <aside class="v2-sidebar">
    <div class="v2-logo">
      <div class="v2-logo-mark">AO</div>
      <div>
        <div class="v2-logo-name">AO3 Helper</div>
        <div class="v2-logo-sub">Settings</div>
      </div>
    </div>

    <nav class="v2-nav" id="v2-nav"><!-- rendered by JS --></nav>

    <div class="v2-qa">
      <button class="v2-qa-btn" id="btn-enable">+ Enable All</button>
      <button class="v2-qa-btn" id="btn-disable">− Disable All</button>
    </div>

    <div class="v2-sidebar-foot">
      <span class="v2-ver">v1.1.0</span>
      <button class="v2-close" onclick="alert('(preview — bouton non fonctionnel)')">×</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="v2-main">
    <div class="v2-topbar">
      <div class="v2-search-wrap">
        <span class="v2-search-ico">🔍</span>
        <input class="v2-search" id="v2-search" placeholder="Search all modules…" autocomplete="off">
      </div>
      <button class="v2-btn v2-btn-ghost" id="btn-reset">↺ Reset</button>
      <button class="v2-btn v2-btn-save">Save</button>
    </div>

    <div class="v2-section-hdr" id="v2-hdr"><!-- rendered by JS --></div>
    <div class="v2-list" id="v2-list"><!-- rendered by JS --></div>
    <div class="v2-status" id="v2-status"><!-- rendered by JS --></div>
  </main>
</div>


<script>
/* ═══════════════════════════════════════════════════════════════════════
   DATA — modules from tab-registry (hardcoded for standalone preview)
═══════════════════════════════════════════════════════════════════════ */
const TABS = [
  { id:'browse',     icon:'⚡', label:'Filter & Display',   modules:[
    { id:'hideByTags',       name:'Hide By Tags',        desc:'Tag-based filtering with groups, whitelist & keyword filter', badge:'popular' },
    { id:'filterManager',    name:'Filter Manager',      desc:'Manage filter presets and work filters', badge:'popular' },
    { id:'skipWorks',        name:'Skip Works',          desc:'Hide works with personal notes' },
    { id:'pageControls',     name:'Page Controls',       desc:'Works per page, jump to page, infinite scroll' },
    { id:'ficEngagement',    name:'Fic Engagement',      desc:'Engagement metrics and hidden gems' },
    { id:'workLength',       name:'Work Length',         desc:'Length badges and reading time estimate' },
    { id:'tagsDisplay',      name:'Tags Display',        desc:'Tag display, highlights, and warnings', badge:'popular' },
  ]},
  { id:'explore',    icon:'🔭', label:'Explore',             modules:[
    { id:'ficPeek',          name:'Fic Peek',            desc:'Preview work content inline' },
    { id:'similarFics',      name:'Similar Fics',        desc:'Find similar works', badge:'exp' },
    { id:'surpriseMe',       name:'Surprise Me',         desc:'Random work suggestions' },
    { id:'tropeGames',       name:'Trope Games',         desc:'Trope horoscope, bingo, and roulette', badge:'exp' },
    { id:'searchEnhancer',   name:'Search Enhancer',     desc:'Enhanced search with autocomplete and sorting' },
    { id:'povTracker',       name:'POV Tracker',         desc:'Standalone point-of-view detection', badge:'exp' },
  ]},
  { id:'reading',    icon:'📖', label:'Reading',             modules:[
    { id:'chapterNavigation',   name:'Chapter Navigation',    desc:'Enhanced chapter navigation', badge:'popular' },
    { id:'readingTracker',      name:'Reading Tracker',       desc:'Unified reading lifecycle: seen, progress, completion', badge:'popular' },
    { id:'textToSpeech',        name:'Text To Speech',        desc:'Text-to-speech for works', badge:'perf' },
    { id:'instantFootnotes',    name:'Instant Footnotes',     desc:'Quick footnote access' },
    { id:'readingFormatter',    name:'Reading Formatter',     desc:'Text formatting and layout options' },
    { id:'collapseAuthorNotes', name:'Collapse Author Notes', desc:'Collapse author notes by default' },
    { id:'wordSwap',            name:'Word Swap',             desc:'Personal word replacement rules' },
  ]},
  { id:'library',    icon:'📚', label:'Library',             modules:[
    { id:'bookmarkVault',      name:'Bookmark Vault',      desc:'Manage bookmarks with notes and organization' },
    { id:'laterShelf',         name:'Later Shelf',         desc:'Manage marked for later list with reminders' },
    { id:'ficAppreciation',    name:'Fic Appreciation',    desc:'Kudos tracking and personal star ratings', badge:'popular' },
    { id:'readingDashboard',   name:'Reading Dashboard',   desc:'Personal reading overview and insights' },
    { id:'activityPanel',      name:'Activity Panel',      desc:'Recent activity summary' },
    { id:'readingTimeline',    name:'Reading Timeline',    desc:'Calendar view of reading history' },
    { id:'notificationCenter', name:'Notification Center', desc:'Track updates on subscribed works' },
    { id:'fanficBingeMode',    name:'Fanfic Binge Mode',   desc:'Standalone binge-reading experience', badge:'exp' },
  ]},
  { id:'navigate',   icon:'⌨️', label:'Navigate & Interact', modules:[
    { id:'mainNavigation',    name:'Main Navigation',    desc:'Quick links and back-to-search button' },
    { id:'keyboardShortcuts', name:'Keyboard Shortcuts', desc:'Keyboard shortcuts for navigation and actions' },
    { id:'userRelationships', name:'User Relationships', desc:'Favorite authors and user blocking' },
    { id:'seriesHelper',      name:'Series Helper',      desc:'Series progress and navigation' },
    { id:'commentKit',        name:'Comment Kit',        desc:'Draft saving and thread navigation' },
    { id:'ficActions',        name:'Fic Actions',        desc:'Manage work action buttons' },
  ]},
  { id:'appearance', icon:'🎨', label:'Appearance & Tools',  modules:[
    { id:'visualPreferences', name:'Visual Preferences', desc:'Stats visibility, density, date format' },
    { id:'themeBuilder',      name:'Theme Builder',      desc:'Custom visual themes for AO3', badge:'popular' },
    { id:'backupAndSync',     name:'Backup & Sync',      desc:'Automatic backup and optional cloud sync' },
    { id:'ficDownloader',     name:'Fic Downloader',     desc:'Download works in multiple formats', badge:'popular' },
  ]},
];

const BADGE_LABELS = { popular:'Popular', exp:'Experimental', perf:'Performance' };

/* ═══════════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════════ */
const enabled = new Set(['hideByTags','filterManager','readingTracker','ficAppreciation']);
let activeTab = 'browse';
let query = '';

/* ═══════════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════════ */
function badge(b) {
  if (!b) return '';
  return `<span class="v2-badge bdg-${b}">${BADGE_LABELS[b]}</span>`;
}

function cardHtml(m) {
  const on = enabled.has(m.id);
  return `
    <div class="v2-card ${on?'on':''}" id="c-${m.id}">
      <div class="v2-card-main">
        <div class="v2-card-info">
          <div class="v2-card-row">
            <span class="v2-card-name">${m.name}</span>${badge(m.badge)}
          </div>
          <div class="v2-card-desc">${m.desc}</div>
        </div>
        <label class="v2-toggle" title="${on?'Enabled — click to disable':'Disabled — click to enable'}">
          <input type="checkbox" ${on?'checked':''} data-id="${m.id}">
          <span class="v2-track"><span class="v2-thumb"></span></span>
        </label>
        <button class="v2-exp-btn" data-id="${m.id}" title="Settings">▼</button>
      </div>
      <div class="v2-config">
        <div class="v2-config-msg">⚙ Settings for <strong>${m.name}</strong> — expand panel config here</div>
      </div>
    </div>`;
}

function bindCards(container) {
  container.querySelectorAll('.v2-toggle input').forEach(cb => {
    cb.addEventListener('change', () => {
      const id = cb.dataset.id;
      cb.checked ? enabled.add(id) : enabled.delete(id);
      document.getElementById('c-'+id)?.classList.toggle('on', cb.checked);
      renderSidebar();
      renderStatus();
    });
  });
  container.querySelectorAll('.v2-exp-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('c-'+btn.dataset.id)?.classList.toggle('open');
    });
  });
}

/* ═══════════════════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════════════════ */
function renderSidebar() {
  document.getElementById('v2-nav').innerHTML =
    TABS.map(t => {
      const n = t.modules.filter(m => enabled.has(m.id)).length;
      const tot = t.modules.length;
      return `<button class="v2-nav-item ${t.id===activeTab?'active':''}" data-tab="${t.id}">
        <span class="v2-nav-icon">${t.icon}</span>
        <span>${t.label}</span>
        <span class="v2-nav-count">${n>0?n:tot}</span>
      </button>`;
    }).join('');
  document.querySelectorAll('.v2-nav-item').forEach(b => {
    b.addEventListener('click', () => { activeTab = b.dataset.tab; query=''; document.getElementById('v2-search').value=''; render(); });
  });
}

function renderMain(modules, title, subtext) {
  const hdr = document.getElementById('v2-hdr');
  const list = document.getElementById('v2-list');
  const n = modules.filter(m => enabled.has(m.id)).length;
  hdr.innerHTML = `
    <span class="v2-section-title">${title}</span>
    <span class="v2-section-sub">${subtext}</span>
    ${n>0 ? `<span class="v2-enabled-badge">${n} enabled</span>` : ''}
  `;
  if (modules.length === 0) {
    list.innerHTML = `<div class="v2-empty">No results for "${query}"</div>`;
    return;
  }
  list.innerHTML = modules.map(cardHtml).join('');
  bindCards(list);
}

function renderStatus() {
  const tot = TABS.reduce((s,t)=>s+t.modules.length,0);
  document.getElementById('v2-status').innerHTML = `
    <span class="v2-status-txt">${tot} modules total</span>
    <span class="v2-status-on">● ${enabled.size} enabled</span>
    <span class="v2-status-hint">Changes not saved</span>
  `;
}

function render() {
  renderSidebar();
  const tab = TABS.find(t => t.id === activeTab);
  if (tab) {
    const filtered = tab.modules.filter(m =>
      !query || m.name.toLowerCase().includes(query) || m.desc.toLowerCase().includes(query)
    );
    renderMain(filtered, `${tab.icon} ${tab.label}`, `${tab.modules.length} modules`);
  }
  renderStatus();
}

/* ═══════════════════════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════════════════════ */
document.getElementById('v2-search').addEventListener('input', e => {
  query = e.target.value.toLowerCase().trim();
  if (query) {
    const all = TABS.flatMap(t => t.modules).filter(m =>
      m.name.toLowerCase().includes(query) || m.desc.toLowerCase().includes(query)
    );
    renderMain(all, '🔍 Search results', `${all.length} found`);
    // keep sidebar but don't mark active
    renderSidebar();
    renderStatus();
  } else {
    render();
  }
});

document.getElementById('btn-enable').addEventListener('click', () => {
  TABS.find(t=>t.id===activeTab)?.modules.forEach(m=>enabled.add(m.id));
  render();
});
document.getElementById('btn-disable').addEventListener('click', () => {
  TABS.find(t=>t.id===activeTab)?.modules.forEach(m=>enabled.delete(m.id));
  render();
});
document.getElementById('btn-reset').addEventListener('click', () => {
  enabled.clear();
  ['hideByTags','filterManager','readingTracker','ficAppreciation'].forEach(id=>enabled.add(id));
  render();
});

/* ═══════════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
