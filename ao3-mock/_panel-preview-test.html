<!-- ══════════════════════════════════════════════════════════════════════

<div class="ao3h-panel-box" role="dialog" aria-modal="true" aria-labelledby="ao3h-panel-title">

    <!-- Header -->
    <div class="ao3h-panel-header">

    <!-- Tabs — boutons générés dynamiquement par JS (identique à panel-ui.js) -->

      <div id="ao3h-tab-container" role="tabpanel" tabindex="0">

<script type="module">
// ════════════════════════════════════════════════════════════════════════
//  PANEL PREVIEW — Copie indépendante du comportement du vrai panel.
//  Modifie librement ce script sans toucher aux vrais fichiers du panel.
//
//  Étape 316 : les données sont importées directement depuis les sources
//  (les poses window.AO3H_Common.TabRegistry / AO3H_PanelConfigs /
//  AO3H_PanelLoader.tabContent ont été supprimées aux étapes 315-316).
//
//  Comportement reproduit fidèlement depuis :
//    panel-ui.js · panel-tab-system.js · panel-index.js
// ════════════════════════════════════════════════════════════════════════
import { TABS, ALL_MODULES } from '../lib/ui/panel/tab-registry.js';
import { PanelConfigs, runInitializer } from '../lib/ui/panel/configs/index.js';
import { tabContent } from '../lib/ui/panel/panel-tab-content.js';

(function () {
  'use strict';

  // ── Sources de données (imports directs) ─────────────────────────────
  const ALL_MODS   = ALL_MODULES;
  const configs    = PanelConfigs;

  if (!TABS.length) {
    document.getElementById('ao3h-tab-container').innerHTML =
      '<p style="color:#c00;padding:20px;">Error: tab-registry.js not loaded.</p>';
    return;
  }

  // ── DOM ──────────────────────────────────────────────────────────────
  const box          = document.querySelector('.ao3h-panel-box');
  const tabsRow      = box.querySelector('.ao3h-panel-tabs-row');
  const tabContainer = document.getElementById('ao3h-tab-container');
  const searchInput  = document.getElementById('ao3h-global-search');
  const flexContainer = box.firstElementChild; // the flex column div — footer appended here

  // ── État ─────────────────────────────────────────────────────────────
  let activeTabId = TABS[0]?.id || 'browse';

  // ── Footer dirty-tracking ─────────────────────────────────────────────
  const footerState = { pendingSaves: 0, dirty: false, _savedTimer: null };

  // ════════════════════════════════════════════════════════════════════
  //  BUILD TAB BUTTONS  (identique à panel-ui.js)
  // ════════════════════════════════════════════════════════════════════

  function buildTabButtons() {
    const defs = [
      ...TABS.map((t, i) => ({ id: t.id, label: t.label, first: i === 0 })),
      { id: 'about', label: 'About', first: false },
    ];
    defs.forEach(({ id, label, first }) => {
      const btn = document.createElement('button');
      btn.className = `ao3h-tab-btn${first ? ' ao3h-tab-active' : ''}`;
      btn.dataset.tab = id;
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', first ? 'true' : 'false');
      btn.id = `ao3h-tab-btn-${id}`;
      btn.textContent = label;
      tabsRow.appendChild(btn);
    });
  }

  // ════════════════════════════════════════════════════════════════════
  //  FOOTER STATUS  (identique à panel-tab-system.js)
  // ════════════════════════════════════════════════════════════════════

  function updateFooterStatus() {
    const status = document.getElementById('ao3h-panel-footer-status');
    if (!status) return;
    const total = ALL_MODS.length;
    let enabled = 0;
    try {
      const flags = JSON.parse(localStorage.getItem('ao3h:flags') || '{}');
      enabled = ALL_MODS.filter(m => {
        const def = !!(m.enabledByDefault);
        return flags[`mod:${m.id}:enabled`] ?? def;
      }).length;
    } catch {}
    const state = footerState.dirty
      ? '<span class="ao3h-footer-unsaved">Unsaved changes</span>'
      : 'All changes saved';
    status.innerHTML = `<strong>${enabled}</strong> enabled · ${total} modules total · ${state}`;
  }

  function beginSave() {
    footerState.pendingSaves += 1;
    footerState.dirty = true;
    clearTimeout(footerState._savedTimer);
    updateFooterStatus();
  }

  function endSave(success) {
    if (footerState.pendingSaves > 0) footerState.pendingSaves -= 1;
    if (success === false) { footerState.dirty = true; updateFooterStatus(); return; }
    clearTimeout(footerState._savedTimer);
    footerState._savedTimer = setTimeout(() => {
      if (footerState.pendingSaves === 0) footerState.dirty = false;
      updateFooterStatus();
    }, 1500);
  }

  // ════════════════════════════════════════════════════════════════════
  //  PERSIST / RESTORE SETTINGS  (identique à panel-tab-system.js)
  // ════════════════════════════════════════════════════════════════════

  async function persistSettings(configArea) {
    const moduleId = configArea.dataset.configModule;
    if (!moduleId) return;
    const inputs = configArea.querySelectorAll('[data-setting]');
    const patch = {};
    const radiosSeen = new Set();
    inputs.forEach(input => {
      const key = input.dataset.setting;
      if (!key) return;
      if (input.type === 'checkbox') {
        patch[key] = input.checked;
      } else if (input.type === 'radio') {
        if (!radiosSeen.has(key)) {
          radiosSeen.add(key);
          const checked = configArea.querySelector(`input[type="radio"][data-setting="${key}"]:checked`);
          if (checked) patch[key] = checked.value;
        }
      } else {
        patch[key] = input.value;
      }
    });
    const storageKey = `ao3h:mod:${moduleId}:settings`;
    const existing = JSON.parse(localStorage.getItem(storageKey) || '{}');
    localStorage.setItem(storageKey, JSON.stringify(Object.assign({}, existing, patch)));
    document.dispatchEvent(new CustomEvent('ao3h:settingsChanged', {
      bubbles: false,
      detail: { moduleId, settings: patch }
    }));
  }

  function restoreAllConfigs(container) {
    container.querySelectorAll('[data-config-module]').forEach(area => {
      const moduleId = area.dataset.configModule;
      if (!moduleId) return;
      try {
        const raw = localStorage.getItem(`ao3h:mod:${moduleId}:settings`);
        if (!raw) return;
        const saved = JSON.parse(raw);
        area.querySelectorAll('[data-setting]').forEach(el => {
          const key = el.dataset.setting;
          if (!(key in saved)) return;
          if (el.type === 'checkbox')   { el.checked = !!saved[key]; }
          else if (el.type === 'radio') { el.checked = (el.value === saved[key]); }
          else                          { el.value = saved[key]; }
        });
      } catch {}
    });
  }

  // ════════════════════════════════════════════════════════════════════
  //  INJECT CONFIGS  (identique à panel-tab-system.js injectConfigs)
  // ════════════════════════════════════════════════════════════════════

  function injectConfigs() {
    document.querySelectorAll('[data-config-module]').forEach(area => {
      const id = area.dataset.configModule;
      const html = configs[id] || configs._default || '';
      if (html) {
        area.innerHTML = html;
        runInitializer(id, area);
      }
    });
  }

  // ════════════════════════════════════════════════════════════════════
  //  CONFIG BUTTONS  (identique à panel-tab-system.js setupConfigButtons)
  // ════════════════════════════════════════════════════════════════════

  function setupConfigButtons(container) {
    container.querySelectorAll('.ao3h-config-btn').forEach(btn => {
      btn.setAttribute('aria-label', 'Module settings');
      btn.setAttribute('aria-expanded', 'false');
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        const modContainer = this.closest('.ao3h-module-container');
        const configArea   = modContainer?.querySelector('.ao3h-module-config-area');
        if (!configArea) return;
        const isExpanded = configArea.classList.contains('ao3h-expanded');
        configArea.classList.toggle('ao3h-expanded');
        this.textContent = isExpanded ? '▼' : '▲';
        this.setAttribute('aria-expanded', isExpanded ? 'false' : 'true');
        if (!isExpanded) {
          const moduleId = modContainer.dataset.moduleId;
          runInitializer(moduleId, configArea);
          configArea.dispatchEvent(new CustomEvent('ao3h:configOpen', {
            bubbles: true, detail: { moduleId, configArea }
          }));
          setTimeout(() => {
            if (typeof window.AO3H_wireHelpButtons === 'function') window.AO3H_wireHelpButtons(configArea);
          }, 0);
          setTimeout(() => {
            const rect    = modContainer.getBoundingClientRect();
            const tabRect = tabContainer.getBoundingClientRect();
            const offset  = rect.top - tabRect.top;
            if (Math.abs(offset) > 5) tabContainer.scrollBy({ top: offset, behavior: 'smooth' });
          }, 450);
        }
      });
    });
  }

  // ════════════════════════════════════════════════════════════════════
  //  RESET BUTTONS  (identique à panel-tab-system.js setupResetButtons)
  // ════════════════════════════════════════════════════════════════════

  function setupResetButtons(container) {
    container.querySelectorAll('.ao3h-config-reset-btn').forEach(btn => {
      let confirmTimer = null;
      const originalLabel = btn.textContent.trim();
      const isFullReset   = btn.dataset.fullReset === 'true';
      btn.addEventListener('click', function () {
        if (this.classList.contains('ao3h-reset-confirming')) {
          clearTimeout(confirmTimer);
          this.classList.remove('ao3h-reset-confirming');
          this.textContent = originalLabel;
          if (isFullReset) {
            try {
              Object.keys(localStorage)
                .filter(k => k.startsWith('ao3h'))
                .forEach(k => localStorage.removeItem(k));
            } catch {}
            location.reload();
          } else {
            const configArea = this.closest('.ao3h-module-config-area');
            if (configArea) {
              configArea.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.type === 'checkbox' || el.type === 'radio') {
                  el.checked = el.defaultChecked;
                } else if (el.tagName === 'SELECT') {
                  Array.from(el.options).forEach(opt => { opt.selected = opt.defaultSelected; });
                } else {
                  el.value = el.defaultValue;
                }
                el.dispatchEvent(new Event('change', { bubbles: true }));
              });
            }
            console.log('[preview] Module reset confirmed');
          }
        } else {
          this.classList.add('ao3h-reset-confirming');
          this.textContent = isFullReset ? '⚠ Reset everything?' : '⚠ Confirm reset?';
          confirmTimer = setTimeout(() => {
            this.classList.remove('ao3h-reset-confirming');
            this.textContent = originalLabel;
          }, 3000);
        }
      });
    });
  }

  // ════════════════════════════════════════════════════════════════════
  //  SAVE BUTTONS  (identique à panel-tab-system.js setupSaveButtons)
  // ════════════════════════════════════════════════════════════════════

  function setupSaveButtons(container) {
    container.querySelectorAll('.ao3h-config-save-btn').forEach(btn => {
      btn.addEventListener('click', async function () {
        const configArea = this.closest('.ao3h-module-config-area');
        if (!configArea?.dataset.configModule) return;
        beginSave();
        try {
          await persistSettings(configArea);
          endSave(true);
        } catch (e) {
          endSave(false);
          console.error('[preview] Save failed for', configArea.dataset.configModule, e);
          return;
        }
        const orig = this.textContent;
        this.textContent = '✓ Saved';
        this.classList.add('ao3h-save-success');
        setTimeout(() => { this.textContent = orig; this.classList.remove('ao3h-save-success'); }, 1500);
      });
    });
  }

  // ════════════════════════════════════════════════════════════════════
  //  AUTO-SAVE DIRTY TRACKING  (identique à panel-tab-system.js)
  // ════════════════════════════════════════════════════════════════════

  function setupAutoSave(container) {
    container.querySelectorAll('.ao3h-module-config-area').forEach(configArea => {
      if (configArea.dataset.autoSaveWired) return;
      configArea.dataset.autoSaveWired = '1';
      configArea.addEventListener('change', e => {
        if (!e.target.closest('[data-setting]')) return;
        footerState.dirty = true;
        clearTimeout(footerState._savedTimer);
        updateFooterStatus();
      });
    });
  }

  // ════════════════════════════════════════════════════════════════════
  //  MODULE ROWS  (identique à panel-tab-system.js setupModuleRows)
  // ════════════════════════════════════════════════════════════════════

  function setupModuleRows(container) {
    container.querySelectorAll('.ao3h-module-row').forEach(row => {
      const modContainer = row.closest('.ao3h-module-container');
      const moduleId     = modContainer?.dataset.moduleId;
      const checkbox     = row.querySelector('.ao3h-quick-enable-checkbox');

      if (checkbox && moduleId) {
        const moduleName = row.querySelector('.ao3h-module-name')?.textContent?.trim() || moduleId;
        checkbox.setAttribute('aria-label', `Enable ${moduleName}`);

        // Restore enable state from localStorage flags
        try {
          const flags = JSON.parse(localStorage.getItem('ao3h:flags') || '{}');
          const mod   = ALL_MODS.find(m => m.id === moduleId);
          const def   = !!(mod?.enabledByDefault);
          checkbox.checked = flags[`mod:${moduleId}:enabled`] ?? def;
        } catch {}

        checkbox.addEventListener('change', function () {
          try {
            const flags = JSON.parse(localStorage.getItem('ao3h:flags') || '{}');
            flags[`mod:${moduleId}:enabled`] = this.checked;
            localStorage.setItem('ao3h:flags', JSON.stringify(flags));
          } catch {}
          updateFooterStatus();
          document.dispatchEvent(new CustomEvent('ao3h:flags-updated', {
            detail: { key: `mod:${moduleId}:enabled`, value: this.checked }
          }));
        });

        // Keep checkbox in sync when another toggle fires the same event
        document.addEventListener('ao3h:flags-updated', function (e) {
          if (e.detail?.key === `mod:${moduleId}:enabled`) {
            checkbox.checked = !!e.detail.value;
          }
        });
      }

      // Click on row (outside toggle) opens config
      row.addEventListener('click', function (e) {
        if (e.target.closest('.ao3h-module-quick-toggle')) return;
        modContainer?.querySelector('.ao3h-config-btn')?.click();
      });
    });
  }

  // ════════════════════════════════════════════════════════════════════
  //  CHIP PICKERS  (identique à panel-tab-system.js setupChipPickers)
  // ════════════════════════════════════════════════════════════════════

  function setupChipPickers(container) {
    container.querySelectorAll('.ao3h-picker-row').forEach(row => {
      const picker         = row.querySelector('.ao3h-picker');
      const addBtn         = row.querySelector('[data-action^="add"]');
      const chipsContainer = row.parentElement.querySelector('.ao3h-chip-container');
      if (!picker || !addBtn || !chipsContainer) return;

      const pickerType = picker.dataset.pickerType || 'item';
      let selectedItems = [];
      try {
        const stored = chipsContainer.dataset.value;
        if (stored) selectedItems = JSON.parse(stored);
      } catch {}

      function updateDataValue() {
        chipsContainer.dataset.value = JSON.stringify(selectedItems);
        chipsContainer.dispatchEvent(new CustomEvent('chipsChanged', {
          detail: { type: pickerType, items: selectedItems }, bubbles: true
        }));
      }

      function addChip(value, text, updateArray = true) {
        if (updateArray && !selectedItems.includes(value)) selectedItems.push(value);
        const chip = document.createElement('span');
        chip.className = 'ao3h-chip';
        chip.dataset.value = value;
        chip.innerHTML = `${text} <button type="button" title="Remove ${text}" aria-label="Remove ${text}">×</button>`;
        chip.querySelector('button').addEventListener('click', () => {
          chip.remove();
          selectedItems = selectedItems.filter(i => i !== value);
          updateDataValue();
        });
        chipsContainer.appendChild(chip);
      }

      function renderChips() {
        chipsContainer.innerHTML = '';
        selectedItems.forEach(v => {
          const opt = picker.querySelector(`option[value="${v}"]`);
          addChip(v, opt ? opt.textContent : v, false);
        });
        updateDataValue();
      }

      function addItem() {
        const value = picker.value;
        if (!value || selectedItems.includes(value)) return;
        const text = picker.options[picker.selectedIndex]?.text;
        addChip(value, text, true);
        updateDataValue();
        picker.selectedIndex = 0;
      }

      addBtn.addEventListener('click', addItem);
      picker.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addItem(); } });
      renderChips();
    });
  }

  // ════════════════════════════════════════════════════════════════════
  //  BULK ACTIONS FOOTER  (identique à panel-tab-system.js)
  // ════════════════════════════════════════════════════════════════════

  function setupBulkActions(tabId) {
    const existing = box.querySelector('.ao3h-bulk-actions');
    if (existing) existing.remove();

    const footer = document.createElement('div');
    footer.className = 'ao3h-bulk-actions';
    footer.innerHTML = `
      <div class="note-box ao3h-footer-status" id="ao3h-panel-footer-status" aria-live="polite"></div>
      <button class="ao3h-panel-action-btn ao3h-footer-save-close">Save &amp; Close</button>
    `;
    flexContainer.appendChild(footer);
    footer.querySelector('.ao3h-footer-save-close').addEventListener('click', saveAllAndClose);

    // Wire Enable All / Disable All (clone to avoid duplicate listeners)
    box.querySelectorAll('.ao3h-bulk-actions-buttons .ao3h-panel-action-btn[data-action]').forEach(btn => {
      const fresh = btn.cloneNode(true);
      btn.replaceWith(fresh);
      fresh.addEventListener('click', function () {
        const shouldCheck = this.dataset.action === 'enable-all';
        tabContainer.querySelectorAll('.ao3h-quick-enable-checkbox').forEach(cb => {
          cb.checked = shouldCheck;
          cb.dispatchEvent(new Event('change', { bubbles: true }));
        });
      });
    });

    updateFooterStatus();
  }

  function setupAboutFooter() {
    const existing = box.querySelector('.ao3h-bulk-actions');
    if (existing) existing.remove();

    const bar = document.createElement('div');
    bar.className = 'ao3h-bulk-actions';
    bar.innerHTML = `
      <div class="note-box ao3h-footer-status" id="ao3h-panel-footer-status" aria-live="polite"></div>
      <button class="ao3h-panel-action-btn ao3h-footer-close">Close</button>
    `;
    flexContainer.appendChild(bar);
    bar.querySelector('.ao3h-footer-close').addEventListener('click', () => {
      console.log('[preview] Close clicked (no-op in preview)');
    });
    updateFooterStatus();
  }

  // ════════════════════════════════════════════════════════════════════
  //  SAVE ALL & CLOSE  (identique à panel-tab-system.js)
  // ════════════════════════════════════════════════════════════════════

  async function saveAllAndClose() {
    for (const area of document.querySelectorAll('.ao3h-module-config-area')) {
      try { await persistSettings(area); } catch (e) {
        console.error('[preview] Save failed for', area.dataset.configModule, e);
      }
    }
    footerState.dirty = false;
    footerState.pendingSaves = 0;
    updateFooterStatus();
    console.log('[preview] Save & Close — settings persisted to localStorage (no actual close in preview)');
  }

  // ════════════════════════════════════════════════════════════════════
  //  ABOUT TAB  (identique à panel-tab-system.js setupAboutTab)
  // ════════════════════════════════════════════════════════════════════

  function setupAboutTab(container) {
    const select  = container.querySelector('#ao3h-pinned-module');
    const saveBtn = container.querySelector('#ao3h-pin-save-btn');
    if (!select || !saveBtn) return;
    ALL_MODS.forEach(m => {
      const opt = document.createElement('option');
      opt.value       = m.id;
      opt.textContent = m.title || m.id;
      select.appendChild(opt);
    });
    const saved = localStorage.getItem('ao3h:pinnedModule');
    if (saved && select.querySelector(`option[value="${saved}"]`)) select.value = saved;
    saveBtn.addEventListener('click', () => {
      const val = select.value;
      if (val) localStorage.setItem('ao3h:pinnedModule', val);
      else     localStorage.removeItem('ao3h:pinnedModule');
      const orig = saveBtn.textContent;
      saveBtn.textContent = '✓ Saved';
      setTimeout(() => { saveBtn.textContent = orig; }, 1500);
    });
  }

  // ════════════════════════════════════════════════════════════════════
  //  LOAD TAB CONTENT  (identique à panel-tab-system.js loadTabContent)
  // ════════════════════════════════════════════════════════════════════

  function loadTabContent(tabId) {
    const content = tabContent[tabId];
    if (!content) {
      tabContainer.innerHTML = `<p style="color:#d32f2f;">❌ Unknown tab: ${tabId}</p>`;
      return;
    }

    tabContainer.style.transition = 'opacity 0.2s ease-out';
    tabContainer.style.opacity = '0';

    setTimeout(() => {
      tabContainer.innerHTML = content;
      tabContainer.scrollTop = 0;
      injectConfigs();
      restoreAllConfigs(tabContainer);

      setTimeout(() => {
        tabContainer.style.opacity = '1';
        setupConfigButtons(tabContainer);
        setupResetButtons(tabContainer);
        setupSaveButtons(tabContainer);
        setupAutoSave(tabContainer);
        setupModuleRows(tabContainer);
        setupChipPickers(tabContainer);
        if (typeof window.AO3H_wireHelpButtons === 'function') {
          window.AO3H_wireHelpButtons(tabContainer);
        }
      }, 20);

      setTimeout(() => {
        if (tabId !== 'about') {
          setupBulkActions(tabId);
        } else {
          setupAboutFooter();
          setupAboutTab(tabContainer);
        }
      }, 10);

    }, 200);
  }

  // ════════════════════════════════════════════════════════════════════
  //  TAB SWITCHING  (identique à panel-tab-system.js setupTabSwitching)
  // ════════════════════════════════════════════════════════════════════

  function setupTabSwitching() {
    const tabBtns = box.querySelectorAll('.ao3h-tab-btn');
    tabBtns.forEach(btn => {
      btn.addEventListener('click', function () {
        const tabId = this.dataset.tab;
        activeTabId = tabId;
        searchInput.value = '';
        tabBtns.forEach(b => {
          b.classList.remove('ao3h-tab-active');
          b.setAttribute('aria-selected', 'false');
        });
        this.classList.add('ao3h-tab-active');
        this.setAttribute('aria-selected', 'true');
        tabContainer.setAttribute('aria-labelledby', `ao3h-tab-btn-${tabId}`);
        loadTabContent(tabId);
      });
    });
    // Initial ARIA on tabpanel
    const initialBtn = box.querySelector('.ao3h-tab-btn.ao3h-tab-active') || tabBtns[0];
    if (initialBtn) {
      tabBtns.forEach(b => b.setAttribute('aria-selected', b === initialBtn ? 'true' : 'false'));
      tabContainer.setAttribute('aria-labelledby', `ao3h-tab-btn-${initialBtn.dataset.tab}`);
    }
  }

  // ════════════════════════════════════════════════════════════════════
  //  GLOBAL SEARCH  (identique à panel-tab-system.js setupGlobalSearch)
  // ════════════════════════════════════════════════════════════════════

  function setupGlobalSearch() {
    if (!searchInput) return;

    // Clear search on manual tab click
    box.querySelectorAll('.ao3h-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => { activeTabId = btn.dataset.tab; searchInput.value = ''; });
    });

    let debounceTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) {
          box.querySelectorAll('.ao3h-tab-btn').forEach(b => {
            b.classList.toggle('ao3h-tab-active', b.dataset.tab === activeTabId);
            b.setAttribute('aria-selected', b.dataset.tab === activeTabId ? 'true' : 'false');
          });
          loadTabContent(activeTabId);
          return;
        }
        box.querySelectorAll('.ao3h-tab-btn').forEach(b => {
          b.classList.remove('ao3h-tab-active');
          b.setAttribute('aria-selected', 'false');
        });
        const results = ALL_MODS.filter(m =>
          (m.title    || '').toLowerCase().includes(query) ||
          (m.desc     || '').toLowerCase().includes(query) ||
          (m.id       || '').toLowerCase().includes(query) ||
          (m.tabLabel || '').toLowerCase().includes(query)
        );
        renderSearchResults(results, query);
      }, 150);
    });
  }

  function renderSearchResults(results, query) {
    let modulesHTML;
    if (results.length === 0) {
      modulesHTML = `<p class="ao3h-search-no-results">No modules found for "<strong>${query}</strong>"</p>`;
    } else {
      modulesHTML = results.map(m => `
        <div class="ao3h-module-container" data-module-id="${m.id}">
          <div class="ao3h-module-row">
            <label class="ao3h-module-quick-toggle" onclick="event.stopPropagation()">
              <input type="checkbox" class="ao3h-quick-enable-checkbox">
            </label>
            <div class="ao3h-module-info">
              <div class="ao3h-module-name">${m.title}</div>
              <div class="ao3h-module-desc">${m.desc}</div>
            </div>
            <div class="ao3h-module-controls">
              <span class="ao3h-search-tab-badge">${m.tabLabel}</span>
              <button class="ao3h-config-btn">▼</button>
            </div>
          </div>
          <div class="ao3h-module-config-area" data-config-module="${m.id}"></div>
        </div>`).join('\n');
    }

    const html = `<div class="ao3h-tab-content ao3h-search-results" data-tab="search-results">
  <div class="ao3h-modules-list">${modulesHTML}</div>
</div>`;

    tabContainer.style.transition = 'opacity 0.15s ease-out';
    tabContainer.style.opacity = '0';

    const existingBulk = box.querySelector('.ao3h-bulk-actions');
    if (existingBulk) existingBulk.remove();

    setTimeout(() => {
      tabContainer.innerHTML = html;
      tabContainer.scrollTop = 0;
      injectConfigs();
      restoreAllConfigs(tabContainer);
      setTimeout(() => {
        tabContainer.style.opacity = '1';
        setupConfigButtons(tabContainer);
        setupResetButtons(tabContainer);
        setupSaveButtons(tabContainer);
        setupAutoSave(tabContainer);
        setupModuleRows(tabContainer);
        setupChipPickers(tabContainer);
      }, 20);
    }, 150);
  }

  // ════════════════════════════════════════════════════════════════════
  //  CLOSE BUTTON (no-op in preview)
  // ════════════════════════════════════════════════════════════════════

  box.querySelector('.ao3h-panel-close')?.addEventListener('click', () => {
    console.log('[preview] Close button clicked (no-op in preview)');
  });

  // ════════════════════════════════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════════════════════════════════

  buildTabButtons();
  setupTabSwitching();
  setupGlobalSearch();
  loadTabContent(activeTabId);

  console.log(`[preview] ✅ ${TABS.length} tabs · ${ALL_MODS.length} modules loaded`);

})();
</script>



</body>
</html>
