  <style>
    /* ── Page de fond simulant AO3 ─────────────────────────────────────── */
    body {
      margin: 0;
      padding: 40px 20px;
      background: #f4ede8;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* ── Toolbar de preview ─────────────────────────────────────────────── */
    .preview-toolbar {
      background: #222;
      color: #ccc;
      font-size: 11px;
      padding: 8px 16px;
      border-radius: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      align-items: center;
      width: 800px;
      max-width: 98vw;
      box-sizing: border-box;
    }
    .preview-toolbar strong { color: #fff; }
    .preview-toolbar a { color: #7eb8f7; text-decoration: none; }
    .preview-toolbar a:hover { text-decoration: underline; }
    .preview-sep { opacity: 0.3; }
    .preview-module-count {
      margin-left: auto;
      color: #7eb8f7;
    }

    /* ── Le panel normalement fixed+centré — ici en flux normal pour preview */
    .ao3h-panel-box {
      position: relative !important;
      top: auto !important;
      left: auto !important;
      transform: none !important;
    }

    /* ── [Test #1] Noms de modules : supprimer les majuscules */
    .ao3h-module-name {
      text-transform: none !important;
      letter-spacing: normal !important;
    }

    /* ── [Test #3] Densité : réduire le padding vertical des rows */
    .ao3h-module-row {
      padding: 8px 10px !important;
    }

    /* ── [Test #4] Bouton × : discret au repos, visible au survol */
    .ao3h-panel-close {
      font-size: 1.1rem !important;
      color: rgba(255, 255, 255, 0.75) !important;  /* était 0.45 (2.6:1) → 0.75 (5.3:1) ✅ WCAG AA */
      background: transparent !important;
      padding: 4px 8px !important;
    }
    .ao3h-panel-close:hover {
      color: rgba(255, 255, 255, 1) !important;
      background: transparent !important;
    }

    /* ── [Test #5] Supprimer les boutons Enable All / Disable All */
    .ao3h-bulk-actions-buttons {
      display: none !important;
    }

    /* ── [Test #6] Header shadow + texture — inspiré du nav bar AO3 */
    .ao3h-panel-header {
      background: #900 url("https://archiveofourown.org/images/skins/textures/tiles/red-ao3.png");
      box-shadow: inset 0 -6px 10px rgba(0, 0, 0, 0.35),
                  1px 1px 3px -1px rgba(0, 0, 0, 0.25),
                  inset 0 -1px 0 rgba(0, 0, 0, 0.85);
    }

    /* ── [Test #7] Titre — text-shadow + couleur légèrement adoucie */
    .ao3h-panel-title {
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
      color: rgba(255, 255, 255, 0.85) !important;
      font-family: Georgia, serif !important;
      font-weight: 600 !important;
    }

    /* ── [Test #9] Titres de section config — Georgia serif */
    .ao3h-config-section-title {
      font-family: Georgia, serif;
      font-weight: 400;
    }

    /* ── [Test #10] Noms de modules — Georgia serif, normal weight, couleur inchangée */
    .ao3h-module-name {
      font-family: Georgia, serif;
      font-weight: 500;
      margin-bottom: 8px !important;
    }

    /* ── [Test #13] Descriptions modules — plus claires, indentées, lisibilité améliorée */
    .ao3h-module-desc {
      color: #767676 !important;  /* était #888 (3.18:1) → #767676 (4.54:1) ✅ WCAG AA */
      font-size: 0.75rem !important;  /* 12px — plus lisible (était 11px) */
      padding-left: 8px !important;
    }

    /* ── [Test #11] Police de base du panel — Lucida Grande (corps de texte AO3) */
    .ao3h-panel-box {
      font-family: 'Lucida Grande', 'Lucida Sans Unicode', Verdana, Helvetica, sans-serif !important;
    }

    /* ── [Test #12] Onglets — légèrement rapetissés (Lucida Grande rend plus grand) */
    .ao3h-tab-btn {
      font-size: 0.8125rem !important;
    }

    /* ── [Test #14] Border-radius panel — 12px → 6px (plus natif AO3) */
    .ao3h-panel-box {
      border-radius: 6px !important;
    }

    /* ── [Test #15] Hover lignes — fond + nom en rouge, sans bordure rouge */
    .ao3h-module-row:hover {
      border-color: transparent !important;
    }
    .ao3h-module-row:hover .ao3h-module-name {
      color: #900 !important;
    }

    /* ── [Test #15b] Config ouverte — row entière en rouge, config reste grise */
    .ao3h-module-container:has(.ao3h-module-config-area.ao3h-expanded) .ao3h-module-row {
      border-color: #900 !important;
      border-radius: 4px 4px 0 0 !important;
    }

    /* ── [Test #23] HideByTags group headers — neutre au repos, rose au survol */
    .ao3h-hbt-group.ao3h-hbt-group--named .ao3h-hbt-group-header,
    .ao3h-hbt-group.ao3h-hbt-group--named[aria-expanded="true"] .ao3h-hbt-group-header {
      background: #fff !important;
      border-left: none !important;
      border-bottom: 1px solid #e6e8ee !important;
    }
    .ao3h-hbt-group.ao3h-hbt-group--named .ao3h-hbt-group-header:hover,
    .ao3h-hbt-group.ao3h-hbt-group--named[aria-expanded="true"] .ao3h-hbt-group-header:hover {
      background: #f9f0f0 !important;
      border-bottom-color: #e0c8c8 !important;
    }
    .ao3h-hbt-group.ao3h-hbt-group--named .ao3h-hbt-group-label {
      color: #333 !important;
    }
    .ao3h-hbt-group.ao3h-hbt-group--named .ao3h-hbt-chevron {
      color: #900 !important;
    }

    /* ── [Test #24] Bouton × des groupes + × des chips — transparent au repos */
    .ao3h-hbt-group-delete { background: transparent !important; border: none !important; color: #900 !important; opacity: 0.45 !important; box-shadow: none !important; }
    .ao3h-hbt-group-delete:hover { background: transparent !important; opacity: 1 !important; }
    .ao3h-tag-chip button.ao3h-tag-chip-remove { background: transparent !important; border: none !important; color: #900 !important; opacity: 0.45 !important; border-radius: 3px !important; }
    .ao3h-tag-chip button.ao3h-tag-chip-remove:hover { background: transparent !important; opacity: 1 !important; }

    /* ── [Test #22] Chips/tags — dotted border AO3, fond blanc */
    .ao3h-tag-chip {
      background: #fff !important;
      border: 1px solid #e6e8ee !important;
      border-radius: 10px !important;
      color: #555 !important;
    }
    .ao3h-tag-chip:hover {
      background: #fff5f5 !important;
      border-color: #900 !important;
    }

    /* ── [Test #21] Checkboxes + radio buttons — accent-color AO3 rouge */
    .ao3h-panel-box input[type="checkbox"],
    .ao3h-panel-box input[type="radio"] {
      accent-color: #900 !important;
    }

    /* ── [Test #20] Setting groups — inset shadow pour profondeur */
    .ao3h-setting-group {
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.15) !important;
    }

    /* ── [Test #19] Onglet actif — barre rouge en bas, pas de boîte */
    .ao3h-tab-btn.ao3h-tab-active {
      color: #900 !important;
      background: transparent !important;
      border: none !important;
      border-bottom: 3px solid #900 !important;
      box-shadow: none !important;
      border-radius: 0 !important;
    }

    /* ── [Test #19b] Onglets inactifs — border-radius 8px → 4px (cohérent avec le reste) */
    .ao3h-tab-btn {
      border-radius: 4px !important;
    }
    .ao3h-panel-header           { order: 1; }
    .ao3h-global-search-wrapper  { order: 2; }
    .ao3h-panel-tabs-container   { order: 3; }
    .ao3h-panel-body             { order: 4; }
    .ao3h-bulk-actions           { order: 5; }

    /* ── [Test #16] Inputs config — border-radius 8px → 3px (plus natif AO3) */
    .ao3h-config-input,
    .ao3h-inline-btn {
      border-radius: 3px !important;
    }

    /* ── [Test #16b] Boutons inline — dégradé AO3 (Export, Import, Add, etc.) */
    .ao3h-inline-btn:not(.ao3h-inline-btn--red):not(.ao3h-inline-btn--danger) {
      background-image: linear-gradient(#fff 2%, #ddd 95%, #bbb 100%) !important;
      border: 1px solid #bbb !important;
      border-bottom-color: #aaa !important;
      color: #444 !important;
      box-shadow: none !important;
    }
    /* Boutons verts — même style, fond vert */
    .ao3h-inline-btn.ao3h-inline-btn--green {
      background-image: linear-gradient(#f1f8e9 2%, #c8e6c9 95%, #a5d6a7 100%) !important;
      color: #2e7d32 !important;
    }
    /* Boutons action (+Add, +Group) — pas de gras */
    .ao3h-config-action-btn { font-weight: normal !important; }
    .ao3h-inline-btn:not(.ao3h-inline-btn--red):not(.ao3h-inline-btn--danger):hover {
      border-top-color: #999 !important;
      border-left-color: #999 !important;
      box-shadow: inset 2px 2px 2px #bbb !important;
    }

    /* ── [Test #17] Bouton Close footer — même dégradé AO3 que Save/Reset */
    .ao3h-footer-close {
      background: #eee !important;
      background-image: linear-gradient(#fff 2%, #ddd 95%, #bbb 100%) !important;
      border: 1px solid #bbb !important;
      border-bottom-color: #aaa !important;
      border-radius: 0.25em !important;
      color: #444 !important;
      font-weight: 400 !important;
      box-shadow: none !important;
    }
    .ao3h-footer-close:hover {
      color: #900 !important;
      border-top-color: #999 !important;
      border-left-color: #999 !important;
      box-shadow: inset 2px 2px 2px #bbb !important;
    }

    /* ── [Test #8] Boutons Save / Reset — style .actions a d'AO3 */
    .ao3h-config-save-btn,
    .ao3h-config-reset-btn {
      background: #eee !important;
      background-image: linear-gradient(#fff 2%, #ddd 95%, #bbb 100%) !important;
      border: 1px solid #bbb !important;
      border-bottom-color: #aaa !important;
      border-radius: 0.25em !important;
      color: #444 !important;
      font-weight: 400 !important;
      box-shadow: none !important;
    }
    /* Save — texte rouge pour le distinguer du Reset */
    .ao3h-config-save-btn {
      color: #900 !important;
      font-weight: 600 !important;
    }
    /* Hover — inset shadow + bordures remontées comme AO3 */
    .ao3h-config-save-btn:hover,
    .ao3h-config-reset-btn:hover {
      color: #900 !important;
      border-top-color: #999 !important;
      border-left-color: #999 !important;
      box-shadow: inset 2px 2px 2px #bbb !important;
    }

<!-- ══════════════════════════════════════════════════════════════════════
   PANEL BOX — structure identique à panel-ui.js
═══════════════════════════════════════════════════════════════════════ -->
<div class="ao3h-panel-box">
  <div style="display: flex; flex-direction: column; height: 100%;">

    <!-- Header -->
    <div class="ao3h-panel-header">
      <h1 class="ao3h-panel-title">AO3 Helper Settings</h1>
      <button class="ao3h-panel-close" onclick="alert('(Preview — bouton non fonctionnel)')">×</button>
    </div>

    <!-- Tabs (générés dynamiquement) -->
    <div class="ao3h-panel-tabs-container">
      <div class="ao3h-panel-tabs-row" id="preview-tabs-row"></div>
    </div>

    <!-- Global Search + Bulk Actions -->
    <div class="ao3h-global-search-wrapper">
      <div class="ao3h-bulk-actions-buttons">
        <button class="ao3h-panel-action-btn" id="preview-enable-all">Enable All</button>
        <button class="ao3h-panel-action-btn" id="preview-disable-all">Disable All</button>
      </div>
      <input type="text" id="ao3h-global-search" class="ao3h-global-search-input"
             placeholder="🔍 Search all modules..." autocomplete="off">
    </div>

    <!-- Body -->
    <div class="ao3h-panel-body">
      <div id="ao3h-tab-container">
        <!-- content injected by JS from panel-tab-content.js -->
      </div>
    </div>

    <div class="ao3h-bulk-actions ao3h-v15-footer">
      <div class="ao3h-v15-status" id="ao3h-v15-status">Loading module status…</div>
      <div class="ao3h-v15-footer-actions">
        <button class="ao3h-panel-action-btn ao3h-v15-reset-all" id="ao3h-v15-reset-all">Reset</button>
        <button class="ao3h-panel-action-btn ao3h-v15-save" id="ao3h-v15-save">Save Changes</button>
        <button class="ao3h-panel-action-btn ao3h-footer-close">Close</button>
      </div>
    </div>

  </div>
</div>


<script>
// ════════════════════════════════════════════════════════════════════════
//  PANEL PREVIEW — Script principal
//  Reproduit fidèlement le comportement du vrai panel.
// ════════════════════════════════════════════════════════════════════════

(function () {
  'use strict';

  // ── Source de vérité ────────────────────────────────────────────────
  const TABS = window.AO3H_Common?.TabRegistry?.TABS || [];
  if (!TABS.length) {
    console.error('[preview] ❌ tab-registry.js non chargé !');
    document.getElementById('preview-modules-list').innerHTML =
      '<p style="color:#c00;padding:20px;">Erreur : tab-registry.js non chargé.</p>';
    return;
  }

  const configs  = window.AO3H_PanelConfigs || {};
  // ── État ─────────────────────────────────────────────────────────────
  let activeTabId  = TABS[0]?.id || '';
  let searchActive = false;

  // ── DOM ──────────────────────────────────────────────────────────────
  const rowEl    = document.getElementById('preview-tabs-row');
  const listEl   = document.getElementById('ao3h-tab-container');
  const searchEl = document.getElementById('ao3h-global-search');
  const countEl  = document.getElementById('preview-module-count');

  // ══════════════════════════════════════════════════════════════════════
  //  ONGLETS
  // ══════════════════════════════════════════════════════════════════════

  function buildTabs() {
    TABS.forEach((tab, i) => {
      rowEl.appendChild(makeTabBtn(tab.id, tab.label, i === 0));
    });
    // About toujours en dernier
    rowEl.appendChild(makeTabBtn('about', 'About', false));
  }

  function makeTabBtn(id, label, isActive) {
    const btn = document.createElement('button');
    btn.className = 'ao3h-tab-btn' + (isActive ? ' ao3h-tab-active' : '');
    btn.dataset.tab = id;
    btn.textContent = label;
    btn.addEventListener('click', () => switchTab(id));
    return btn;
  }

  function switchTab(tabId) {
    activeTabId = tabId;
    searchActive = false;
    if (searchEl) searchEl.value = '';
    document.querySelectorAll('.ao3h-tab-btn').forEach(b => {
      b.classList.toggle('ao3h-tab-active', b.dataset.tab === tabId);
    });
    renderTab(tabId);
  }

  // ══════════════════════════════════════════════════════════════════════
  //  RENDU D'UN ONGLET
  // ══════════════════════════════════════════════════════════════════════

  function renderTab(tabId) {
    listEl.innerHTML = '';

    const tabContent = window.AO3H_PanelLoader?.tabContent;

    if (tabId === 'about') {
      listEl.innerHTML = tabContent?.about ||
        '<p style="color:#c00;padding:20px;">About content not found.</p>';
      if (countEl) countEl.textContent = '';
      return;
    }

    const content = tabContent?.[tabId];
    if (!content) {
      listEl.innerHTML = '<p style="color:#c00;padding:20px;">Tab content not found.</p>';
      return;
    }

    listEl.innerHTML = content;

    // Inject module configs (same as real panel’s injectConfigs)
    listEl.querySelectorAll('[data-config-module]').forEach(area => {
      const id = area.dataset.configModule;
      const html = configs[id] || configs._default || '';
      if (html) area.innerHTML = html;
    });

    // Help tooltips
    if (typeof window.AO3H_wireHelpButtons === 'function') {
      window.AO3H_wireHelpButtons(listEl);
    }

    // Wire expand/collapse + reset buttons on each module
    listEl.querySelectorAll('.ao3h-module-container').forEach(container => {
      setupResetButtons(container);
      wireModuleRow(container);
      applyToggleStyle(container);
    });

    const tab = TABS.find(t => t.id === tabId);
    if (countEl) countEl.textContent = tab ? `${tab.modules.length} modules` : '';
  }

  // ══════════════════════════════════════════════════════════════════════
  //  CONSTRUCTION D'UN MODULE (utilisé uniquement pour les résultats de recherche)
  // ══════════════════════════════════════════════════════════════════════

  function buildModuleEl(mod) {
    const el = document.createElement('div');
    el.className = 'ao3h-module-container';
    el.dataset.moduleId = mod.id;
    el.innerHTML = `
      <div class="ao3h-module-row">
        <label class="ao3h-module-quick-toggle" onclick="event.stopPropagation()">
          <input type="checkbox" class="ao3h-quick-enable-checkbox" checked>
        </label>
        <div class="ao3h-module-info">
          <div class="ao3h-module-name">${mod.title}</div>
          <div class="ao3h-module-desc">${mod.desc || ''}</div>
        </div>
        <div class="ao3h-module-controls">
          <button class="ao3h-config-btn">▼</button>
        </div>
      </div>
      <div class="ao3h-module-config-area" data-config-module="${mod.id}"></div>
    `;

    // Inject config
    const cfgArea = el.querySelector('[data-config-module]');
    if (cfgArea) {
      const html = configs[mod.id] || configs._default || '';
      if (html) cfgArea.innerHTML = html;
    }

    // Help tooltips
    if (typeof window.AO3H_wireHelpButtons === 'function') {
      window.AO3H_wireHelpButtons(el);
    }

    // Wire reset + expand/collapse
    setupResetButtons(el);
    wireModuleRow(el);
    applyToggleStyle(el);

    return el;
  }

  // ══════════════════════════════════════════════════════════════════════
  //  EXPAND / COLLAPSE (partagé entre tab content et résultats de recherche)
  // ══════════════════════════════════════════════════════════════════════

  function wireModuleRow(container) {
    const cfgArea = container.querySelector('.ao3h-module-config-area');
    const btn     = container.querySelector('.ao3h-config-btn');
    const row     = container.querySelector('.ao3h-module-row');

    if (!cfgArea || !btn || !row) return;

    let initialized = false;

    function toggleConfig() {
      const isOpen = cfgArea.classList.contains('ao3h-expanded');
      cfgArea.classList.toggle('ao3h-expanded', !isOpen);
      row.classList.toggle('ao3h-module-row--expanded', !isOpen);
      btn.textContent = isOpen ? '▼' : '▲';
      btn.classList.toggle('ao3h-config-btn--open', !isOpen);
      // Run module initializer (wires inputs + renderList) on first open
      if (!isOpen && !initialized) {
        initialized = true;
        const moduleId = cfgArea.dataset.configModule || container.dataset.moduleId;
        if (moduleId) window.AO3H_PanelConfigs?.runInitializer?.(moduleId, cfgArea);
      }
    }

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleConfig();
    });

    row.addEventListener('click', (e) => {
      if (e.target.closest('.ao3h-module-quick-toggle')) return;
      toggleConfig();
    });
  }

  // ── [Test #2] Injecte le track/thumb dans chaque label toggle ──────────
  function applyToggleStyle() {}

  // ══════════════════════════════════════════════════════════════════════
  //  RECHERCHE GLOBALE
  // ══════════════════════════════════════════════════════════════════════

  function setupSearch() {
    if (!searchEl) return;
    searchEl.addEventListener('input', () => {
      const q = searchEl.value.trim().toLowerCase();
      if (!q) {
        if (searchActive) {
          searchActive = false;
          // Restaure l'onglet actif
          document.querySelectorAll('.ao3h-tab-btn').forEach(b => {
            b.classList.toggle('ao3h-tab-active', b.dataset.tab === activeTabId);
          });
          renderTab(activeTabId);
        }
        return;
      }
      searchActive = true;
      document.querySelectorAll('.ao3h-tab-btn').forEach(b => b.classList.remove('ao3h-tab-active'));
      renderSearchResults(q);
    });
  }

  function renderSearchResults(q) {
    listEl.innerHTML = '';
    let total = 0;

    const wrapper = document.createElement('div');
    wrapper.className = 'ao3h-modules-list';

    TABS.forEach(tab => {
      const matched = tab.modules.filter(m =>
        m.title.toLowerCase().includes(q) || (m.desc || '').toLowerCase().includes(q)
      );
      matched.forEach(mod => {
        const el = buildModuleEl(mod);
        // Badge du tab
        const badge = document.createElement('div');
        badge.style.cssText = 'font-size:10px;color:#aaa;padding:4px 10px 0;font-style:italic;';
        badge.textContent = tab.label;
        el.prepend(badge);
        wrapper.appendChild(el);
        total++;
      });
    });

    if (total === 0) {
      listEl.innerHTML = `<p style="color:#999;padding:20px;text-align:center;">Aucun module pour « ${q} »</p>`;
    } else {
      listEl.appendChild(wrapper);
    }
    if (countEl) countEl.textContent = `${total} résultat${total > 1 ? 's' : ''}`;
  }

  // ══════════════════════════════════════════════════════════════════════
  //  BULK ACTIONS
  // ══════════════════════════════════════════════════════════════════════

  document.getElementById('preview-enable-all')?.addEventListener('click', () => {
    listEl.querySelectorAll('.ao3h-quick-enable-checkbox').forEach(cb => cb.checked = true);
  });
  document.getElementById('preview-disable-all')?.addEventListener('click', () => {
    listEl.querySelectorAll('.ao3h-quick-enable-checkbox').forEach(cb => cb.checked = false);
  });

  // ══════════════════════════════════════════════════════════════════════
  //  RESET BUTTONS (double-clic confirmation)
  // ══════════════════════════════════════════════════════════════════════

  function setupResetButtons(container) {
    container.querySelectorAll('.ao3h-config-reset-btn').forEach(btn => {
      if (btn._resetWired) return;
      btn._resetWired = true;

      const originalLabel = btn.textContent.trim();
      const isFullReset = btn.dataset.fullReset === 'true';
      let confirmTimer = null;

      btn.addEventListener('click', function () {
        if (this.classList.contains('ao3h-reset-confirming')) {
          clearTimeout(confirmTimer);
          this.classList.remove('ao3h-reset-confirming');
          this.textContent = originalLabel;

          if (isFullReset) {
            console.log('[preview] Full reset triggered (no-op in preview)');
          } else {
            const configArea = this.closest('.ao3h-module-config-area');
            if (configArea) {
              configArea.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.type === 'checkbox' || el.type === 'radio') {
                  el.checked = el.defaultChecked;
                } else if (el.tagName === 'SELECT') {
                  Array.from(el.options).forEach(opt => { opt.selected = opt.defaultSelected; });
                } else {
                  el.value = el.defaultValue;
                }
                el.dispatchEvent(new Event('change', { bubbles: true }));
              });
            }
          }
        } else {
          this.classList.add('ao3h-reset-confirming');
          this.textContent = isFullReset ? '⚠ Reset everything?' : '⚠ Confirm reset?';
          confirmTimer = setTimeout(() => {
            this.classList.remove('ao3h-reset-confirming');
            this.textContent = originalLabel;
          }, 3000);
        }
      });
    });
  }

  // ══════════════════════════════════════════════════════════════════════
  //  INIT
  // ══════════════════════════════════════════════════════════════════════

  buildTabs();
  renderTab(activeTabId);
  setupSearch();

  const total = TABS.reduce((n, t) => n + t.modules.length, 0);
  console.log(`[preview] ✅ ${TABS.length} tabs · ${total} modules chargés`);

})();
</script>


<!-- ── AO3 Helper v1.5 enhancements ─────────────────────────────────── -->
<script>
(function ao3hV15Enhancements() {
  'use strict';

  const BADGES = {
    hideByTags: 'popular',
    filterManager: 'popular',
    tagsDisplay: 'popular',
    chapterNavigation: 'popular',
    readingTracker: 'popular',
    ficAppreciation: 'popular',
    themeBuilder: 'popular',
    ficDownloader: 'popular',
    similarFics: 'experimental',
    tropeGames: 'experimental',
    povTracker: 'experimental',
    fanficBingeMode: 'experimental',
    textToSpeech: 'performance'
  };

  const BADGE_LABELS = {
    popular: 'Popular',
    experimental: 'Experimental',
    performance: 'Performance'
  };

  let dirty = false;
  let observerPaused = false;
  const enabledState = new Map();

  function tabs() {
    return window.AO3H_Common?.TabRegistry?.TABS || [];
  }

  function allModules() {
    return tabs().flatMap(tab => (tab.modules || []).map(module => ({ ...module, tabId: tab.id, tabLabel: tab.label })));
  }

  function moduleIdFromContainer(container) {
    return container?.dataset?.moduleId || container?.querySelector('[data-config-module]')?.dataset?.configModule || '';
  }

  function moduleById(id) {
    return allModules().find(module => module.id === id);
  }

  function ensureInitialState() {
    allModules().forEach(module => {
      if (!enabledState.has(module.id)) enabledState.set(module.id, true);
    });
  }

  function enabledCountForTab(tab) {
    return (tab.modules || []).filter(module => enabledState.get(module.id) !== false).length;
  }

  function totalEnabledCount() {
    return allModules().filter(module => enabledState.get(module.id) !== false).length;
  }

  function enhanceTabs() {
    ensureInitialState();
    document.querySelectorAll('.ao3h-tab-btn').forEach(btn => {
      const id = btn.dataset.tab;
      if (!btn.dataset.v15BaseLabel) btn.dataset.v15BaseLabel = btn.textContent.trim();
      const tab = tabs().find(item => item.id === id);
      if (!tab) {
        btn.textContent = btn.dataset.v15BaseLabel;
        return;
      }
      const count = enabledCountForTab(tab);
      btn.innerHTML = '';
      const label = document.createElement('span');
      label.textContent = btn.dataset.v15BaseLabel;
      const badge = document.createElement('span');
      badge.className = 'ao3h-v15-tab-count';
      badge.textContent = String(count);
      badge.title = `${count} enabled modules`;
      btn.append(label, badge);
    });
  }

  function makeBadge(type) {
    const badge = document.createElement('span');
    badge.className = `ao3h-v15-badge ao3h-v15-badge--${type}`;
    badge.textContent = BADGE_LABELS[type] || type;
    return badge;
  }

  function enhanceModule(container) {
    if (!container || container.dataset.v15Enhanced === 'true') return;
    const id = moduleIdFromContainer(container);
    if (!id) return;

    const module = moduleById(id);
    const row = container.querySelector('.ao3h-module-row');
    const name = container.querySelector('.ao3h-module-name');
    const checkbox = container.querySelector('.ao3h-quick-enable-checkbox');

    if (checkbox && !enabledState.has(id)) enabledState.set(id, checkbox.checked !== false);
    if (checkbox && enabledState.has(id)) checkbox.checked = enabledState.get(id) !== false;

    if (row) row.classList.toggle('ao3h-v15-enabled', enabledState.get(id) !== false);

    if (name && !name.querySelector('.ao3h-v15-badge')) {
      const line = document.createElement('span');
      line.className = 'ao3h-v15-title-line';
      while (name.firstChild) line.appendChild(name.firstChild);
      const type = BADGES[id];
      if (type) line.appendChild(makeBadge(type));
      name.appendChild(line);
    }

    if (checkbox) {
      checkbox.addEventListener('change', () => {
        enabledState.set(id, checkbox.checked);
        row?.classList.toggle('ao3h-v15-enabled', checkbox.checked);
        dirty = true;
        updateAllChrome();
      });
    }

    container.dataset.v15Enhanced = 'true';
  }

  function activeTabId() {
    return document.querySelector('.ao3h-tab-btn.ao3h-tab-active')?.dataset?.tab || '';
  }

  function addTabSummary() {
    const container = document.getElementById('ao3h-tab-container');
    if (!container) return;
    container.querySelector('.ao3h-v15-tab-summary')?.remove();

    const id = activeTabId();
    if (!id || id === 'about') return;
    const tab = tabs().find(item => item.id === id);
    if (!tab) return;

    const summary = document.createElement('div');
    summary.className = 'ao3h-v15-tab-summary';
    summary.innerHTML = `
      <span class="ao3h-v15-tab-summary-title">${tab.label}</span>
      <span class="ao3h-v15-tab-summary-meta">${tab.modules.length} modules</span>
      <span class="ao3h-v15-tab-summary-enabled">${enabledCountForTab(tab)} enabled</span>
    `;
    container.prepend(summary);
  }

  function enhanceVisibleModules() {
    document.querySelectorAll('.ao3h-module-container').forEach(enhanceModule);
  }

  function updateStatus() {
    const status = document.getElementById('ao3h-v15-status');
    if (!status) return;
    const total = allModules().length;
    const enabled = totalEnabledCount();
    const unsaved = dirty ? '<span class="ao3h-v15-unsaved">Unsaved changes</span>' : 'All changes saved';
    status.innerHTML = `<strong>${enabled}</strong> enabled · ${total} modules total · ${unsaved}`;
  }

  function updateAllChrome() {
    if (observerPaused) return;
    observerPaused = true;
    enhanceTabs();
    enhanceVisibleModules();
    addTabSummary();
    updateStatus();
    observerPaused = false;
  }

  function wireFooterButtons() {
    document.getElementById('ao3h-v15-save')?.addEventListener('click', () => {
      dirty = false;
      updateStatus();
    });
    document.getElementById('ao3h-v15-reset-all')?.addEventListener('click', () => {
      ensureInitialState();
      allModules().forEach(module => enabledState.set(module.id, true));
      document.querySelectorAll('.ao3h-quick-enable-checkbox').forEach(cb => { cb.checked = true; });
      dirty = true;
      updateAllChrome();
    });
  }

  function init() {
    ensureInitialState();
    wireFooterButtons();
    updateAllChrome();

    const target = document.getElementById('ao3h-tab-container');
    if (target) {
      const observer = new MutationObserver(() => {
        if (!observerPaused) requestAnimationFrame(updateAllChrome);
      });
      observer.observe(target, { childList: true, subtree: true });
    }

    document.getElementById('preview-tabs-row')?.addEventListener('click', () => {
      requestAnimationFrame(updateAllChrome);
    });

    document.getElementById('ao3h-global-search')?.addEventListener('input', () => {
      requestAnimationFrame(updateAllChrome);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

    localStorage.setItem('ao3h:hideTagsNopeGroups',
      JSON.stringify({ 'major character death': 'Warnings', 'graphic violence': 'Warnings', 'noncon': 'Warnings' }));

})();
</script>
